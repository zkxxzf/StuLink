version: '3.8'

services:
  stulink:
    image: stulink:v1.5.0
    container_name: stulink
    ports:
      - "5000:5000"
    volumes:
      # 数据目录（永不覆盖，含 db + 密钥文件）
      - ./stulink-data:/app/data
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_URL=sqlite:////app/data/system.db
      - SECRET_KEY=
