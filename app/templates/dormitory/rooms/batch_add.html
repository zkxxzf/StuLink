{% extends "base.html" %}
{% block title %}批量添加宿舍{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-3">
    <a href="{{ url_for('rooms.list_rooms') }}" class="btn btn-sm btn-outline-secondary me-3">
        <i class="bi bi-arrow-left"></i> 返回
    </a>
    <h4 class="fw-bold mb-0"><i class="bi bi-building"></i> 批量添加宿舍</h4>
</div>

<div class="card" style="max-width: 640px;">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label class="form-label">宿舍楼 <span class="text-danger">*</span></label>
                <select name="building" class="form-select" required>
                    <option value="">请选择宿舍楼</option>
                    {% for b in buildings %}
                    <option value="{{ b }}">{{ b }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">楼层 <span class="text-danger">*</span></label>
                <select name="floor" class="form-select" required>
                    <option value="">请选择楼层</option>
                    {% for f in floors %}
                    <option value="{{ f }}">{{ f }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">性别 <span class="text-danger">*</span></label>
                <select name="gender" class="form-select" required>
                    <option value="男">男生宿舍</option>
                    <option value="女">女生宿舍</option>
                </select>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">房间数量 <span class="text-danger">*</span></label>
                    <input type="number" name="room_count" class="form-control" value="20" min="1" max="100" required>
                    <div class="form-text">一次最多添加 100 间宿舍</div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">床位数 <span class="text-danger">*</span></label>
                    <input type="number" name="capacity" class="form-control" value="8" min="1" max="20" required>
                    <div class="form-text">默认 8 人间</div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">起始房间号 <span class="text-danger">*</span></label>
                <input type="text" name="start_room_number" class="form-control" placeholder="例如：201" value="201" required>
                <div class="form-text">系统会自动生成连续的房间号，如 201-220</div>
            </div>

            <div class="alert alert-info small">
                <i class="bi bi-info-circle"></i> <strong>批量添加说明：</strong>
                <ul class="mb-0 mt-1">
                    <li>系统会根据起始房间号和数量自动生成连续的宿舍</li>
                    <li>如果某个房间号已存在，会自动跳过</li>
                    <li>每个宿舍会自动创建对应数量的床位</li>
                    <li>添加完成后可以在宿舍列表中查看和管理</li>
                </ul>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-plus-lg"></i> 开始批量添加
                </button>
                <a href="{{ url_for('rooms.list_rooms') }}" class="btn btn-outline-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
